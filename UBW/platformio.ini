; Common settings that apply to all environments
[env]
platform = espressif32
board = seeed_xiao_esp32c3
framework = arduino
board_upload.speed = 115200
monitor_speed = 115200

; ============================================================
; Oryginalne pliki (src/tag.cpp, src/anchor.cpp)
; ============================================================

[env:tag]
build_src_filter = +<tag.cpp> -<anchor.cpp> -<ss_twr/>

[env:anchor]
build_src_filter = +<anchor.cpp> -<tag.cpp> -<ss_twr/>

; ============================================================
; SS-TWR / basic — kopia oryginału, punkt odniesienia
; ============================================================

[env:ss_twr_basic_tag]
build_src_filter = +<ss_twr/basic/tag.cpp> -<tag.cpp> -<anchor.cpp>

[env:ss_twr_basic_anchor]
build_src_filter = +<ss_twr/basic/anchor.cpp> -<tag.cpp> -<anchor.cpp>

; ============================================================
; SS-TWR / no_correction — bez korekcji dryfu zegarów
; Porównanie z basic pokazuje ile błędu wnosi dryft
; ============================================================

[env:ss_twr_nocorr_tag]
build_src_filter = +<ss_twr/no_correction/tag.cpp> -<tag.cpp> -<anchor.cpp>

[env:ss_twr_nocorr_anchor]
build_src_filter = +<ss_twr/no_correction/anchor.cpp> -<tag.cpp> -<anchor.cpp>

; ============================================================
; SS-TWR / averaged — uśrednia AVG_SAMPLES pomiarów,
; drukuje średnią i odchylenie standardowe
; ============================================================

[env:ss_twr_avg_tag]
build_src_filter = +<ss_twr/averaged/tag.cpp> -<tag.cpp> -<anchor.cpp>

[env:ss_twr_avg_anchor]
build_src_filter = +<ss_twr/averaged/anchor.cpp> -<tag.cpp> -<anchor.cpp>

; ============================================================
; DS-TWR — Double-Sided, 3 ramki (Poll→Response→Final)
; Anchor oblicza i drukuje dystans, eliminuje dryft do rzędu ε²
; ============================================================

[env:ds_twr_tag]
build_src_filter = +<ds_twr/tag.cpp> -<tag.cpp> -<anchor.cpp> -<ss_twr/>

[env:ds_twr_anchor]
build_src_filter = +<ds_twr/anchor.cpp> -<tag.cpp> -<anchor.cpp> -<ss_twr/>

; ============================================================
; TDoA — blink_node nadaje, listener_node odbiera i raportuje
; LISTENER_ID i TAG_ID zmień przed kompilacją per urządzenie
; ============================================================

[env:tdoa_blink]
build_src_filter = +<tdoa/blink_node.cpp> -<tag.cpp> -<anchor.cpp> -<ss_twr/> -<ds_twr/>

[env:tdoa_listener]
build_src_filter = +<tdoa/listener_node.cpp> -<tag.cpp> -<anchor.cpp> -<ss_twr/> -<ds_twr/>